<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twibbon SaaS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-4">
  <h1 class="text-3xl font-bold mb-4">Twibbon Generator</h1>

  <div class="grid md:grid-cols-2 gap-4">

    <div class="bg-white p-4 rounded-xl shadow">
      <input type="file" id="photoInput" class="mb-4 w-full" accept="image/*">

      <!--
        Pengelolaan frame:
        1. Upload file frame ke folder frames/ (misal: frame1.png, frame2.png, frame3.png)
        2. Tambahkan option di dropdown di bawah ini sesuai nama file
        3. Nama bebas, value harus sama persis dengan nama file di folder frames/
      -->
      <select id="frameSelect" class="w-full p-2 border mb-4">
        <option value="">Pilih Frame</option>
        <option value="frame1.png">Frame 1</option>
        <option value="frame2.png">Frame 2</option>
        <option value="frame1a.png">Frame 1A</option>
      </select>

      <input type="text" id="userName" placeholder="Nama kamu (opsional)" class="w-full p-2 border mb-4">

      <label>Zoom</label>
      <input type="range" id="zoom" min="0.5" max="3" step="0.01" value="1" class="w-full mb-3">

      <div class="flex gap-2 mb-3">
        <button onclick="downloadImage()" class="bg-blue-600 text-white px-4 py-2 rounded w-full">
          Download
        </button>
        <button id="shareFb" class="bg-blue-500 text-white px-4 py-2 rounded w-full">
          Share FB
        </button>
      </div>

      <!-- URL Campaign di-nonaktifkan sementara -->
    </div>

    <div class="bg-white p-4 rounded-xl shadow flex justify-center items-center">
      <div id="canvas-drag-area">
        <canvas id="canvas" width="1080" height="1080"></canvas>
        <div id="overlayText" class="overlay-text"></div>
      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
